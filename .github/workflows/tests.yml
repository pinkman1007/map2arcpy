name: tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (zero runtime deps — this is the whole install)
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
      - name: Run the test suite
        run: pytest -q
      - name: CLI smoke test
        run: |
          map2arcpy --version
          map2arcpy generate "choropleth of pop_density from wards.geojson titled 'CI Smoke'" -o smoke.py
          python -m py_compile smoke.py
          map2arcpy recipes flood_buffer -o recipe_smoke.py
          python -m py_compile recipe_smoke.py

  gpd-end-to-end:
    # the open-source backend is EXECUTED against real data — the one backend
    # we can fully verify in CI (arcpy needs ArcGIS Pro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install . pytest geopandas matplotlib mapclassify
      - run: M2A_RUN_GPD=1 pytest -q tests/test_gpd.py tests/test_recipes.py

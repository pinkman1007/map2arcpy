name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 and 3.11 mirror the Pythons shipped with ArcGIS Pro 2.9/3.x
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test CLI
        run: |
          map2arcpy examples --list
          map2arcpy generate examples/describe_choropleth.txt -o /tmp/out.py
          python -m py_compile /tmp/out.py
